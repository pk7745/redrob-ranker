ai_usage_summary: |
  Used Claude for system architecture design, scoring logic discussion,
  and code review. All ranking is performed locally by rank.py using
  deterministic multi-signal scoring. No candidate data was sent to
  any external LLM or API during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal weighted ranker built directly from the real JD text.
  Seven scoring components: title fit (26%), skill depth (28%),
  experience fit (12%), career quality (14%), availability signals (12%),
  education (5%), location (3%). Skill trust multiplier penalises keyword
  stuffing — expert proficiency with 0 duration_months is deflated to 0.15.
  Career quality component penalises pure consulting backgrounds (TCS,
  Infosys, Wipro etc.) as explicitly stated in the JD. Title disqualifier
  removes marketing managers, accountants, civil engineers and other
  non-ML profiles from top 100. Honeypot detection uses 4 flags: expert
  skills with zero duration, career months mismatch vs claimed YOE,
  10+ expert skills with <15 endorsements, and impossible company tenure.
  37 honeypots blocked. Runtime: ~10 seconds for 100K candidates on CPU.
  Zero external dependencies — Python stdlib only.

